name: fadocx
description: "Offline-first document viewer for Android, macOS, Windows, and Linux"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # UI COMPONENTS
  # =========================
  fl_chart: ^1.2.0

  # =========================
  # SCANNING & OCR (Open Source)
  # =========================
  camera: ^0.12.0+1
  image_picker: ^1.2.1
  flutter_tesseract_ocr: ^0.4.30
  
  # =========================
  # IMAGE PROCESSING
  # =========================
  image: ^4.8.0
  opencv_dart: ^2.2.1+4

  # =========================
  # STATE MANAGEMENT
  # =========================
  flutter_riverpod: ^3.3.1

  # =========================
  # ROUTING
  # =========================
  go_router: ^17.2.1

  # =========================
  # FILE SYSTEM
  # =========================
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  open_file: ^3.5.11

  # =========================
  # PDF VIEWER
  # =========================

  # =========================
  # DOCX (TEXT EXTRACTION)
  # =========================
  # docx_to_text removed — DOCX is parsed via archive + xml (same as ODT/ODX)

  # =========================
  # LEGACY FORMATS (DOC, XLS) & OPENOFFICE
  # =========================
  archive: ^4.0.9  # For ODP, ODS, ODT, DOCX, PPTX (zip-based)
  xml: ^6.6.1  # For parsing ODF/OOXML

  # =========================
  # XLSX
  # =========================
  # excel package removed — XLSX is parsed natively via Apache POI (platform channel)

  # =========================
  # LOCAL STORAGE
  # =========================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =========================
  # UTILITIES
  # =========================
  uuid: ^4.5.3
  logger: ^2.7.0

  # =========================
  # UI
  # =========================
  google_fonts: ^8.0.2

  # =========================
  # INTERNATIONALIZATION
  # =========================
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  pdfrx: ^2.2.24
  flutter_launcher_icons: ^0.14.4
  package_info_plus: ^9.0.1
  highlight: ^0.7.0
  url_launcher: ^6.3.2
  simple_icons: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#0D0D0D"
  image: "assets/fadocx_header_landscape_png.png"
  image_dark: "assets/fadocx_header_landscape_png.png"
  android_gravity: center
  android_12:
    color: "#0D0D0D"
    image: "assets/fadocx_header_landscape_png.png"
    image_dark: "assets/fadocx_header_landscape_png.png"
  fullscreen: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/fadocx.png"
  # Flavor-specific icons are generated via separate config files:
  # dart run flutter_launcher_icons -f flutter_launcher_icons-beta.yaml
  # dart run flutter_launcher_icons -f flutter_launcher_icons-prod.yaml

dependency_overrides:
  matcher: ^0.12.16
  test_api: ^0.7.0

flutter:
  uses-material-design: true
  generate: true  # Enable l10n code generation
  
  assets:
    - assets/tessdata/
    - assets/tessdata_config.json
    - assets/fadocx.png
    - assets/fadocx_beta.png
    - assets/fadocx_header_landscape_png.png
    - assets/samples/
  
  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/ubuntu_regular.ttf
          weight: 400
