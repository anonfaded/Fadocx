name: fadocx
description: "Offline-first document viewer for Android, macOS, Windows, and Linux"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # SCANNING & OCR (Open Source)
  # =========================
  camera: ^0.12.0+1
  image_picker: ^1.2.1
  flutter_tesseract_ocr: ^0.4.30
  
  # =========================
  # IMAGE PROCESSING
  # =========================
  image: ^4.8.0
  opencv_dart: ^2.2.1+4

  # =========================
  # STATE MANAGEMENT
  # =========================
  flutter_riverpod: ^3.3.1

  # =========================
  # ROUTING
  # =========================
  go_router: ^17.2.1

  # =========================
  # FILE SYSTEM
  # =========================
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  open_file: ^3.5.11

  # =========================
  # PDF VIEWER
  # =========================

  # =========================
  # DOCX (TEXT EXTRACTION)
  # =========================
  # docx_to_text removed — DOCX is parsed via archive + xml (same as ODT/ODX)

  # =========================
  # LEGACY FORMATS (DOC, XLS) & OPENOFFICE
  # =========================
  archive: ^4.0.9  # For ODP, ODS, ODT, DOCX, PPTX (zip-based)
  xml: ^6.6.1  # For parsing ODF/OOXML

  # =========================
  # XLSX
  # =========================
  # excel package removed — XLSX is parsed natively via Apache POI (platform channel)

  # =========================
  # LOCAL STORAGE
  # =========================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =========================
  # UTILITIES
  # =========================
  uuid: ^4.5.3
  logger: ^2.7.0

  # =========================
  # UI
  # =========================
  google_fonts: ^8.0.2

  # =========================
  # INTERNATIONALIZATION
  # =========================
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  pdfrx: ^2.2.24

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#121212"
  image: "assets/app_icon.png"
  android_12:
    color: "#121212"
    image: "assets/app_icon.png"
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true  # Enable l10n code generation
  
  assets:
    - assets/tessdata/
    - assets/tessdata_config.json
