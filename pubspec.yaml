name: fadocx
description: "Offline-first document viewer for Android, macOS, Windows, and Linux"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # STATE MANAGEMENT
  # =========================
  flutter_riverpod: ^3.3.1

  # =========================
  # ROUTING
  # =========================
  go_router: ^17.2.1

  # =========================
  # FILE SYSTEM
  # =========================
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  open_file: ^3.5.4

  # =========================
  # PDF VIEWER
  # =========================
  pdfx: ^2.9.2

  # =========================
  # DOCX (TEXT EXTRACTION)
  # =========================
  docx_to_text: ^1.0.1

  # =========================
  # LEGACY FORMATS (DOC, XLS) & OPENOFFICE
  # =========================
  archive: ^3.6.1  # For ODP, ODS, ODT (zip-based)
  xml: ^6.6.1  # For parsing ODF XML

  # =========================
  # XLSX
  # =========================
  excel: ^4.0.6

  # =========================
  # LOCAL STORAGE
  # =========================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =========================
  # UTILITIES
  # =========================
  uuid: ^4.5.3
  logger: ^2.7.0

  # =========================
  # UI
  # =========================
  google_fonts: ^8.0.2

  # =========================
  # INTERNATIONALIZATION
  # =========================
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true  # Enable l10n code generation
